name: e2e
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # e2e certification IT compiles generated code at release 16 (java.gen not yet Java-8-compatible, see java.gen#9); needs JDK >=16 to compile, unlike the plugin build itself (JDK 11)
          java-version: '21'
          cache: maven
      - run: sudo apt-get update && sudo apt-get install -y libpq5
      - run: mvn -B verify -Pe2e
