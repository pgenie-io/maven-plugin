name: e2e
on:
  push:
    branches: [main, master]
  workflow_dispatch:
jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - run: sudo apt-get update && sudo apt-get install -y libpq5
      - run: mvn -B verify -Pe2e
